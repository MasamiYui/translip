name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg + CJK font
        # fonts-noto-cjk lets the translip_lab synthetic-subtitle GT generator run
        # in CI (otherwise those tests skip for lack of a CJK font).
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (base + dev + lab extras)
        run: uv sync --frozen --extra dev --extra lab --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest -q

      - name: Doctor smoke check
        # Read-only env self-check; exits non-zero only if FFmpeg/ffprobe are
        # missing (installed above), so this also verifies the command runs.
        run: uv run translip doctor --json

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (typecheck + bundle)
        run: npm run build

      - name: Unit / component tests
        run: npm run test -- --run
