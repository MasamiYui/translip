<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <radialGradient id="vglow" cx="60%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="vsh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="vbig" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#6366f1"/>
    </marker>
    <style>
      .t1{font-size:15px;font-weight:700;fill:#0f172a;}
      .t2{font-size:11.5px;fill:#64748b;}
      .mono{font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="600" fill="#fbfcfe"/>
  <rect x="0" y="0" width="960" height="600" fill="url(#vglow)"/>

  <!-- kicker -->
  <circle cx="68" cy="64" r="5" fill="#4f46e5"/>
  <text x="84" y="69" font-size="14.5" font-weight="700" fill="#475569" letter-spacing="0.5">幕后 · 博客 · 算法</text>

  <!-- LEFT: reference clip = borrowed timbre -->
  <rect class="box" x="40" y="196" width="252" height="232" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#vsh)"/>
  <rect x="40" y="196" width="6" height="232" rx="3" fill="#3b5bdb"/>
  <text x="66" y="230" class="t1" font-size="15" fill="#3730a3">参考 · 借来的音色</text>
  <rect x="66" y="244" width="120" height="22" rx="11" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="126" y="259" text-anchor="middle" font-size="11.5" font-weight="700" fill="#4338ca" class="mono">spk_0000</text>
  <rect x="60" y="284" width="212" height="78" rx="10" fill="#f8fafc" stroke="#eef2f7"/>
  <polyline points="74,322 80,308 86,334 92,302 98,338 104,310 110,330 116,296 122,342 128,308 134,332 140,300 146,336 152,314 158,328 164,304 170,336 176,310 182,330 188,316 194,326 200,312 206,332 212,318 218,328 224,320 230,324 236,321 242,322 248,322 254,322" fill="none" stroke="#3b5bdb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="66" y="386" class="t2">中文原声 · 8–10.5 秒</text>
  <text x="66" y="408" font-size="12" font-weight="700" fill="#475569">这段，就是"音色提示词"</text>

  <!-- target line bubble (top input) -->
  <rect x="380" y="150" width="248" height="62" rx="14" fill="#fff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#vsh)"/>
  <text x="398" y="176" font-size="11.5" font-weight="700" fill="#047857">新台词 · 一句他从没说过的话</text>
  <text x="398" y="197" class="mono" font-size="12" fill="#334155">"I never said this before."</text>
  <path d="M504,212 L504,250" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#vbig)"/>
  <text x="540" y="238" class="t2" font-size="11" fill="#047857">要念的字</text>

  <!-- CENTER: zero-shot TTS engine -->
  <path d="M298,312 L360,312" fill="none" stroke="#6366f1" stroke-width="3.5" marker-end="url(#vbig)"/>
  <text x="328" y="302" text-anchor="middle" font-size="11.5" font-weight="700" fill="#4338ca">音色</text>
  <rect x="372" y="266" width="240" height="104" rx="16" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5" filter="url(#vsh)"/>
  <text x="492" y="306" text-anchor="middle" font-size="16" font-weight="800" fill="#3730a3">零样本 TTS 引擎</text>
  <text x="492" y="330" text-anchor="middle" class="t2" font-size="12">不训练 · 拿一段参考即时克隆</text>
  <text x="492" y="352" text-anchor="middle" class="t2" font-size="11" fill="#94a3b8">音色 + 新台词 → 一段新语音</text>

  <!-- engine to right -->
  <path d="M612,318 L674,318" fill="none" stroke="#6366f1" stroke-width="3.5" marker-end="url(#vbig)"/>
  <text x="643" y="308" text-anchor="middle" font-size="11.5" font-weight="700" fill="#4338ca">念出来</text>

  <!-- RIGHT: dubbed line in the SAME timbre -->
  <rect x="686" y="196" width="234" height="232" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#vsh)"/>
  <rect x="914" y="196" width="6" height="232" rx="3" fill="#3b5bdb"/>
  <text x="710" y="230" class="t1" font-size="15" fill="#3730a3">配音 · 他的嗓子</text>
  <rect x="704" y="284" width="200" height="78" rx="10" fill="#f8fafc" stroke="#eef2f7"/>
  <polyline points="716,322 722,306 728,336 734,300 740,340 746,308 752,332 758,294 764,344 770,306 776,334 782,300 788,338 794,312 800,330 806,302 812,338 818,308 824,332 830,314 836,328 842,310 848,334 854,316 860,328 866,318 872,326 878,321 884,323 890,322" fill="none" stroke="#3b5bdb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="710" y="386" class="t2">English · 同一把嗓子</text>
  <text x="710" y="408" font-size="12" font-weight="700" fill="#475569">音色是借的，台词是新的</text>

  <!-- tagline -->
  <text x="480" y="496" text-anchor="middle" font-size="17" fill="#334155">借一段声音 —— 去说它<tspan font-weight="700" fill="#4338ca">从没说过的话</tspan></text>
  <text x="480" y="528" text-anchor="middle" class="t2" font-size="12.5">Task D · 单说话人音色克隆与语音合成</text>
</svg>
