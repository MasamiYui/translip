<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 472" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <filter id="bsh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="bdown" markerWidth="11" markerHeight="11" refX="4" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,0 L4,9 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .h{fill:#0f172a;font-weight:700;}
      .s{fill:#64748b;}
      .nm{font-size:15px;font-weight:800;}
      .rl{font-size:11px;fill:#94a3b8;font-weight:700;}
      .rv{font-size:12.5px;font-weight:700;fill:#334155;}
      .note{font-size:11px;fill:#64748b;}
      .mono{font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="472" rx="16" fill="#fbfcfe"/>
  <text x="32" y="42" class="h" font-size="21">一个接口，三台引擎</text>
  <text x="32" y="66" class="s" font-size="13.5">同一份输入进任意一台都出音频；差异落在三处——要不要参考文本、用什么旋钮兜住时长、跑在哪。</text>

  <!-- shared input band -->
  <rect x="32" y="86" width="896" height="58" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="52" y="112" font-size="13" font-weight="800" fill="#3730a3">输入（三台共用）</text>
  <rect x="190" y="98" width="246" height="32" rx="8" fill="#fff" stroke="#c7d2fe"/>
  <text x="206" y="119" class="mono" font-size="12" fill="#4338ca">ReferencePackage · 音色提示词</text>
  <text x="452" y="119" font-size="14" font-weight="800" fill="#94a3b8">+</text>
  <rect x="472" y="98" width="150" height="32" rx="8" fill="#fff" stroke="#bbf7d0"/>
  <text x="488" y="119" class="mono" font-size="12" fill="#047857">target_text</text>
  <text x="900" y="119" text-anchor="end" class="note">→ synthesize()</text>

  <!-- distribution arrows -->
  <path d="M168,146 L168,168" fill="none" stroke="#94a3b8" stroke-width="2.4" marker-end="url(#bdown)"/>
  <path d="M480,146 L480,168" fill="none" stroke="#94a3b8" stroke-width="2.4" marker-end="url(#bdown)"/>
  <path d="M792,146 L792,168" fill="none" stroke="#94a3b8" stroke-width="2.4" marker-end="url(#bdown)"/>

  <!-- Card 1: MOSS (default) -->
  <rect x="32" y="176" width="272" height="238" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2" filter="url(#bsh)"/>
  <rect x="32" y="176" width="6" height="238" rx="3" fill="#3b5bdb"/>
  <text x="54" y="210" class="nm" fill="#3730a3">MOSS-TTS-Nano</text>
  <rect x="232" y="192" width="56" height="22" rx="11" fill="#16a34a"/>
  <text x="260" y="207" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">默认</text>
  <line x1="54" y1="224" x2="282" y2="224" stroke="#eef2f7"/>
  <text x="54" y="248" class="rl">参考文本</text><text x="150" y="248" class="rv" fill="#3730a3">不需要 · 纯听音色</text>
  <text x="54" y="290" class="rl">管时长</text><text x="150" y="290" class="rv">帧数上限</text><text x="150" y="307" class="mono" font-size="10.5" fill="#94a3b8">max_new_frames=375</text>
  <text x="54" y="340" class="rl">跑在哪</text><text x="150" y="340" class="rv" fill="#3730a3">CPU · 纯本地</text>
  <rect x="54" y="358" width="228" height="40" rx="8" fill="#eef2ff"/>
  <text x="66" y="382" class="note" fill="#4338ca">100M 最轻 · ONNX · 可多 worker 并行</text>

  <!-- Card 2: Qwen -->
  <rect x="344" y="176" width="272" height="238" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#bsh)"/>
  <rect x="344" y="176" width="6" height="238" rx="3" fill="#0ea5e9"/>
  <text x="366" y="210" class="nm" fill="#0369a1">Qwen3-TTS · 0.6B</text>
  <line x1="366" y1="224" x2="594" y2="224" stroke="#eef2f7"/>
  <text x="366" y="248" class="rl">参考文本</text><text x="462" y="248" class="rv" fill="#0369a1">icl 要 / xvec 不要</text>
  <text x="366" y="290" class="rl">管时长</text><text x="462" y="290" class="rv">token 预算</text><text x="462" y="307" class="mono" font-size="10.5" fill="#94a3b8">12 tok/s × 1.25</text>
  <text x="366" y="340" class="rl">跑在哪</text><text x="462" y="340" class="rv">CPU / GPU</text>
  <rect x="366" y="358" width="228" height="40" rx="8" fill="#f0f9ff"/>
  <text x="378" y="382" class="note" fill="#0369a1">两种克隆模式：in-context / x-vector</text>

  <!-- Card 3: VoxCPM2 -->
  <rect x="656" y="176" width="272" height="238" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#bsh)"/>
  <rect x="656" y="176" width="6" height="238" rx="3" fill="#059669"/>
  <text x="678" y="210" class="nm" fill="#047857">VoxCPM2</text>
  <rect x="828" y="192" width="84" height="22" rx="11" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="870" y="207" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">音色最像</text>
  <line x1="678" y1="224" x2="906" y2="224" stroke="#eef2f7"/>
  <text x="678" y="248" class="rl">参考文本</text><text x="774" y="248" class="rv" fill="#047857">ultimate 用 / 否则纯音频</text>
  <text x="678" y="290" class="rl">管时长</text><text x="774" y="290" class="rv">CFG + 扩散步数</text>
  <text x="678" y="340" class="rl">跑在哪</text><text x="774" y="340" class="rv">GPU 优先 · 否则 CPU</text>
  <rect x="678" y="358" width="228" height="40" rx="8" fill="#ecfdf5"/>
  <text x="690" y="382" class="note" fill="#047857">48kHz · 最重 · 坏样本自动重试</text>

  <!-- bottom banner -->
  <text x="480" y="446" text-anchor="middle" font-size="13" fill="#475569"><tspan class="mono" fill="#334155">runner.py</tspan> 只认 <tspan class="mono" font-weight="700" fill="#4338ca">synthesize()</tspan> 这一个口子 —— <tspan font-weight="700" fill="#334155">换引擎不改流程</tspan></text>
</svg>
