<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 472" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="ia" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="ish" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="imel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde725"/>
      <stop offset="40%" stop-color="#35b779"/>
      <stop offset="72%" stop-color="#31688e"/>
      <stop offset="100%" stop-color="#440154"/>
    </linearGradient>
    <style>
      .h{fill:#0f172a;font-weight:700;}
      .s{fill:#64748b;}
      .box{fill:#fff;stroke:#e2e8f0;stroke-width:1.5;filter:url(#ish);}
      .nm{font-size:12px;font-weight:700;fill:#0f172a;}
      .q{font-size:10.5px;fill:#64748b;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="472" rx="16" fill="#fbfcfe"/>
  <text x="32" y="42" class="h" font-size="21">从一个分数，到一排仪器</text>
  <text x="32" y="66" class="s" font-size="13.5">分数是分诊信号，不是解释——把它摊开成五件仪器，每一件回答一个具体的问题。</text>

  <!-- the single score card on top -->
  <rect class="box" x="330" y="92" width="300" height="86" rx="13"/>
  <rect x="330" y="92" width="6" height="86" rx="3" fill="#94a3b8"/>
  <text x="356" y="128" font-size="34" font-weight="800" fill="#475569">59.9</text>
  <text x="356" y="150" class="s" font-size="11">满分 100 · review</text>
  <text x="448" y="120" font-size="12" fill="#334155">能说 <tspan font-weight="700">"有问题"</tspan></text>
  <text x="448" y="142" font-size="12" fill="#94a3b8">说不清 哪几句·为什么·多糟</text>
  <rect x="448" y="152" width="160" height="18" rx="9" fill="#f1f5f9"/>
  <text x="528" y="165" text-anchor="middle" font-size="10.5" font-weight="700" fill="#64748b">分诊信号 · 不是解释</text>

  <!-- fan-out arrows -->
  <path d="M420,182 C300,206 130,206 122,228" class="s" fill="none" stroke="#cbd5e1" stroke-width="1.6" marker-end="url(#ia)"/>
  <path d="M460,182 C400,206 320,210 303,228" fill="none" stroke="#cbd5e1" stroke-width="1.6" marker-end="url(#ia)"/>
  <path d="M480,182 L480,228" fill="none" stroke="#cbd5e1" stroke-width="1.6" marker-end="url(#ia)"/>
  <path d="M500,182 C560,206 640,210 657,228" fill="none" stroke="#cbd5e1" stroke-width="1.6" marker-end="url(#ia)"/>
  <path d="M540,182 C660,206 830,206 838,228" fill="none" stroke="#cbd5e1" stroke-width="1.6" marker-end="url(#ia)"/>
  <text x="480" y="216" text-anchor="middle" font-size="11.5" font-weight="700" fill="#4338ca">摊开成证据</text>

  <!-- five instrument cards -->
  <!-- 1 timbre -->
  <rect class="box" x="36" y="234" width="165" height="200" rx="13"/>
  <rect x="36" y="234" width="6" height="200" rx="3" fill="#f59e0b"/>
  <g>
    <rect x="60" y="262" width="13" height="30" rx="2" fill="#ef4444"/>
    <rect x="75" y="262" width="13" height="30" rx="2" fill="#f59e0b"/>
    <rect x="90" y="262" width="13" height="30" rx="2" fill="#f59e0b"/>
    <rect x="105" y="262" width="13" height="30" rx="2" fill="#10b981"/>
    <rect x="120" y="262" width="13" height="30" rx="2" fill="#10b981"/>
    <rect x="135" y="262" width="13" height="30" rx="2" fill="#ef4444"/>
    <rect x="150" y="262" width="13" height="30" rx="2" fill="#10b981"/>
  </g>
  <text x="60" y="332" class="nm">音色三态热条</text>
  <text x="60" y="356" class="q">沿时间轴把每段</text>
  <text x="60" y="372" class="q">的相似度摊成三色</text>
  <text x="60" y="406" font-size="11" font-weight="700" fill="#b45309">哪几段音色不对？</text>

  <!-- 2 embedding -->
  <rect class="box" x="217" y="234" width="165" height="200" rx="13"/>
  <rect x="217" y="234" width="6" height="200" rx="3" fill="#4f46e5"/>
  <g>
    <circle cx="258" cy="280" r="3.6" fill="#3b5bdb"/>
    <circle cx="270" cy="288" r="3.6" fill="#3b5bdb"/>
    <circle cx="264" cy="298" r="3.6" fill="#3b5bdb"/>
    <rect x="263" y="275" width="9" height="9" rx="1.5" transform="rotate(45 267.5 279.5)" fill="#fff" stroke="#3b5bdb" stroke-width="1.6"/>
    <circle cx="338" cy="292" r="3.6" fill="#10b981"/>
    <circle cx="350" cy="300" r="3.6" fill="#10b981"/>
    <rect x="343" y="287" width="9" height="9" rx="1.5" transform="rotate(45 347.5 291.5)" fill="#fff" stroke="#10b981" stroke-width="1.6"/>
    <circle cx="306" cy="266" r="3.6" fill="#f59e0b"/>
  </g>
  <text x="241" y="332" class="nm">embedding 散点</text>
  <text x="241" y="356" class="q">192 维音色向量</text>
  <text x="241" y="372" class="q">PCA 降到 2D</text>
  <text x="241" y="406" font-size="11" font-weight="700" fill="#3730a3">聚到对的人身上了吗？</text>

  <!-- 3 pitch -->
  <rect class="box" x="398" y="234" width="165" height="200" rx="13"/>
  <rect x="398" y="234" width="6" height="200" rx="3" fill="#0ea5e9"/>
  <path d="M422,300 C438,276 452,284 468,268 S498,262 512,280 S540,270 552,276" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <path d="M422,306 C440,294 452,272 470,282 S498,272 512,262 S540,272 552,266" fill="none" stroke="#3b5bdb" stroke-width="2.2" stroke-linecap="round"/>
  <text x="422" y="332" class="nm">音高轮廓</text>
  <text x="422" y="356" class="q">原片(灰)·配音(蓝)</text>
  <text x="422" y="372" class="q">叠在对数 Hz 上</text>
  <text x="422" y="406" font-size="11" font-weight="700" fill="#0369a1">跟上原片的语调了吗？</text>

  <!-- 4 mel -->
  <rect class="box" x="579" y="234" width="165" height="200" rx="13"/>
  <rect x="579" y="234" width="6" height="200" rx="3" fill="#059669"/>
  <rect x="603" y="262" width="118" height="22" rx="3" fill="url(#imel)"/>
  <rect x="603" y="288" width="118" height="22" rx="3" fill="url(#imel)" opacity="0.82"/>
  <text x="603" y="332" class="nm">梅尔频谱</text>
  <text x="603" y="356" class="q">上原片·下配音</text>
  <text x="603" y="372" class="q">viridis = dB 强度</text>
  <text x="603" y="406" font-size="11" font-weight="700" fill="#047857">音质纹理像不像？</text>

  <!-- 5 radar -->
  <rect class="box" x="760" y="234" width="164" height="200" rx="13"/>
  <rect x="760" y="234" width="6" height="200" rx="3" fill="#8b5cf6"/>
  <g transform="translate(842,288)">
    <polygon points="0,-26 25,-8 15,21 -15,21 -25,-8" fill="none" stroke="#e2e8f0" stroke-width="1.2"/>
    <polygon points="0,-13 12,-4 8,11 -8,11 -13,-4" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <polygon points="0,-22 19,-6 9,16 -12,17 -18,-6" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-width="1.6"/>
  </g>
  <text x="784" y="332" class="nm">说话人雷达</text>
  <text x="784" y="356" class="q">按人聚合 5 个轴</text>
  <text x="784" y="372" class="q">越靠外越好</text>
  <text x="784" y="406" font-size="11" font-weight="700" fill="#6d28d9">哪个角色整体配崩了？</text>

  <text x="32" y="458" class="s" font-size="12.5">分数没被丢掉，它退回它该在的位置——一个分诊信号；真正的裁决，连同证据，一起交回给人。</text>
</svg>
