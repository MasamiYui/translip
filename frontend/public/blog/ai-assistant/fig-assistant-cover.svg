<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <radialGradient id="aglow" cx="50%" cy="36%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <marker id="aa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="ash" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .t1{font-size:15px;font-weight:700;}
      .t2{font-size:11.5px;fill:#64748b;}
      .mono{font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="600" fill="#fbfcfe"/>
  <rect x="0" y="0" width="960" height="600" fill="url(#aglow)"/>

  <!-- kicker -->
  <circle cx="68" cy="68" r="5" fill="#4f46e5"/>
  <text x="84" y="73" font-size="14.5" font-weight="700" fill="#475569" letter-spacing="0.5">幕后 · 博客 · 架构</text>

  <!-- natural-language request bubble -->
  <rect x="70" y="120" width="300" height="80" rx="16" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.6" filter="url(#ash)"/>
  <path d="M150,200 L150,224 L182,200 Z" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.6"/>
  <path d="M150,201 L181,201" stroke="#ffffff" stroke-width="2"/>
  <text x="92" y="150" font-size="11.5" font-weight="700" fill="#94a3b8" letter-spacing="0.5">你说</text>
  <text x="220" y="173" text-anchor="middle" font-size="16" font-weight="600" fill="#334155">把这个视频配成英文配音</text>

  <!-- planner hub -->
  <circle cx="600" cy="196" r="118" fill="none" stroke="#6366f1" stroke-width="1.4" stroke-opacity="0.14"/>
  <circle cx="600" cy="196" r="92" fill="none" stroke="#6366f1" stroke-width="1.4" stroke-opacity="0.22"/>
  <circle cx="600" cy="196" r="64" fill="#ffffff" stroke="#6366f1" stroke-width="2.2" filter="url(#ash)"/>
  <text x="600" y="192" text-anchor="middle" font-size="20" font-weight="700" fill="#4338ca">AI 助手</text>
  <text x="600" y="215" text-anchor="middle" font-size="12" fill="#6366f1">DeepSeek 规划</text>

  <!-- request -> hub -->
  <path d="M372,168 C440,150 500,160 537,182" stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#aa)"/>

  <!-- conducting fan lines to the chain -->
  <g stroke="#6366f1" stroke-width="1.4" stroke-opacity="0.16" fill="none">
    <path d="M600,260 L180,422"/>
    <path d="M600,260 L330,422"/>
    <path d="M600,260 L480,422"/>
    <path d="M600,260 L630,422"/>
    <path d="M600,260 L780,422"/>
  </g>

  <!-- tagline -->
  <text x="480" y="346" text-anchor="middle" font-size="17" fill="#64748b">一句话进，一条你能看、能改、能复跑的调用链出</text>

  <!-- the call chain: step (top) + the artifact it produces (bottom) -->
  <!-- 分离 -->
  <rect x="122" y="438" width="116" height="82" rx="13" fill="#f5f7ff" stroke="#c7d2fe" stroke-width="1.6" filter="url(#ash)"/>
  <text x="180" y="474" text-anchor="middle" class="t1" fill="#4338ca">分离</text>
  <text x="180" y="496" text-anchor="middle" class="t2">→ 人声</text>
  <!-- 转写 -->
  <rect x="272" y="438" width="116" height="82" rx="13" fill="#f5f7ff" stroke="#c7d2fe" stroke-width="1.6" filter="url(#ash)"/>
  <text x="330" y="474" text-anchor="middle" class="t1" fill="#4338ca">转写</text>
  <text x="330" y="496" text-anchor="middle" class="t2">→ 文本</text>
  <!-- 翻译 -->
  <rect x="422" y="438" width="116" height="82" rx="13" fill="#f5f7ff" stroke="#c7d2fe" stroke-width="1.6" filter="url(#ash)"/>
  <text x="480" y="474" text-anchor="middle" class="t1" fill="#4338ca">翻译</text>
  <text x="480" y="496" text-anchor="middle" class="t2">→ 译文</text>
  <!-- 合成 -->
  <rect x="572" y="438" width="116" height="82" rx="13" fill="#f5f7ff" stroke="#c7d2fe" stroke-width="1.6" filter="url(#ash)"/>
  <text x="630" y="474" text-anchor="middle" class="t1" fill="#4338ca">合成</text>
  <text x="630" y="496" text-anchor="middle" class="t2">→ 配音</text>
  <!-- 回贴 -->
  <rect x="722" y="438" width="116" height="82" rx="13" fill="#eef2ff" stroke="#6366f1" stroke-width="2" filter="url(#ash)"/>
  <text x="780" y="474" text-anchor="middle" class="t1" fill="#4338ca">回贴</text>
  <text x="780" y="496" text-anchor="middle" class="t2" fill="#6366f1">→ 成片</text>

  <!-- spine arrows = Binding passes the artifact to the next step -->
  <g stroke="#94a3b8" stroke-width="1.6" fill="none">
    <path d="M238,479 L270,479" marker-end="url(#aa)"/>
    <path d="M388,479 L420,479" marker-end="url(#aa)"/>
    <path d="M538,479 L570,479" marker-end="url(#aa)"/>
    <path d="M688,479 L720,479" marker-end="url(#aa)"/>
  </g>

  <!-- mechanism chip -->
  <rect x="276" y="548" width="408" height="34" rx="10" fill="#0f172a"/>
  <text x="480" y="570" text-anchor="middle" class="mono" font-size="12" fill="#e2e8f0">inputs: Binding( source = step ) — 产物自动接力</text>
</svg>
