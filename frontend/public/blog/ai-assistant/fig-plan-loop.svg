<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="pa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="psh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .lbl{font-size:11.5px;fill:#64748b;}
      .mono{font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;}
    </style>
  </defs>
  <rect x="0" y="0" width="960" height="460" fill="#fbfcfe"/>

  <!-- inputs -->
  <text x="135" y="66" text-anchor="middle" class="lbl" font-weight="700" fill="#475569">喂给规划器</text>
  <rect x="28" y="78" width="214" height="312" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.4" filter="url(#psh)"/>
  <!-- chip: 你的话 -->
  <rect x="46" y="98" width="178" height="60" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.3"/>
  <text x="135" y="122" text-anchor="middle" font-size="13.5" font-weight="700" fill="#4338ca">你的话</text>
  <text x="135" y="142" text-anchor="middle" class="lbl">「配成英文配音」</text>
  <!-- chip: 对话历史 -->
  <rect x="46" y="170" width="178" height="60" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.3"/>
  <text x="135" y="194" text-anchor="middle" font-size="13.5" font-weight="700" fill="#334155">对话历史</text>
  <text x="135" y="214" text-anchor="middle" class="lbl">多轮上下文</text>
  <!-- chip: 可用文件 -->
  <rect x="46" y="242" width="178" height="60" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.3"/>
  <text x="135" y="266" text-anchor="middle" font-size="13.5" font-weight="700" fill="#334155">可用文件</text>
  <text x="135" y="286" text-anchor="middle" class="lbl">上传 + 历史产物</text>
  <!-- chip: 工具目录 (highlighted) -->
  <rect x="46" y="314" width="178" height="60" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6"/>
  <text x="135" y="338" text-anchor="middle" font-size="13.5" font-weight="700" fill="#4338ca">工具目录</text>
  <text x="135" y="358" text-anchor="middle" class="lbl" fill="#6366f1">从 schema 现生成</text>

  <!-- DeepSeek -->
  <path d="M242,234 L296,234" stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#pa)"/>
  <rect x="300" y="196" width="156" height="88" rx="14" fill="#ffffff" stroke="#6366f1" stroke-width="2" filter="url(#psh)"/>
  <text x="378" y="232" text-anchor="middle" font-size="18" font-weight="700" fill="#4338ca">DeepSeek</text>
  <text x="378" y="254" text-anchor="middle" class="lbl" fill="#6366f1">temperature 0 · 强制 JSON</text>

  <!-- JSON -->
  <path d="M456,240 L500,240" stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#pa)"/>
  <rect x="504" y="202" width="146" height="76" rx="12" fill="#0f172a"/>
  <text x="520" y="227" class="mono" font-size="12" fill="#e2e8f0">{ summary,</text>
  <text x="520" y="245" class="mono" font-size="12" fill="#e2e8f0">&#160;&#160;steps[],</text>
  <text x="520" y="263" class="mono" font-size="12" fill="#e2e8f0">&#160;&#160;edges[] }</text>

  <!-- 校验 -->
  <path d="M650,240 L690,240" stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#pa)"/>
  <rect x="694" y="196" width="120" height="88" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8" filter="url(#psh)"/>
  <text x="754" y="230" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">校验</text>
  <text x="754" y="252" text-anchor="middle" class="lbl" fill="#b45309">工具 / 参数 / 顺序</text>

  <!-- outputs -->
  <path d="M814,220 C834,200 838,188 836,172" stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#pa)"/>
  <rect x="826" y="120" width="120" height="52" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <text x="886" y="143" text-anchor="middle" font-size="13.5" font-weight="700" fill="#047857">计划</text>
  <text x="886" y="161" text-anchor="middle" class="mono lbl" fill="#059669">plan</text>

  <path d="M814,262 C834,284 838,300 836,316" stroke="#94a3b8" stroke-width="1.6" fill="none" marker-end="url(#pa)"/>
  <rect x="826" y="312" width="120" height="52" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="886" y="335" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1d4ed8">反问一句</text>
  <text x="886" y="353" text-anchor="middle" class="mono lbl" fill="#3b82f6">clarification</text>
</svg>
