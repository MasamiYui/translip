<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 472" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .card{fill:#fff;stroke:#e2e8f0;stroke-width:1.5;filter:url(#sh2);}
      .h{fill:#0f172a;font-weight:700;}
      .k{fill:#94a3b8;font-weight:700;font-size:11px;letter-spacing:.04em;}
      .v{fill:#1e293b;font-size:13.5px;}
      .s{fill:#64748b;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="472" rx="16" fill="#fbfcfe"/>
  <text x="32" y="44" class="h" font-size="21">两个后端，一份契约</text>
  <text x="32" y="68" class="s" font-size="13.5">分流之后，两类素材交给各自最擅长的模型；但产出被归一成同一组文件。</text>

  <!-- Demucs card -->
  <rect class="card" x="32" y="92" width="430" height="300" rx="14"/>
  <rect x="32" y="92" width="430" height="52" rx="14" fill="#f5f3ff"/>
  <rect x="32" y="120" width="430" height="24" fill="#f5f3ff"/>
  <circle cx="58" cy="118" r="7" fill="#8b5cf6"/>
  <text x="76" y="123" font-size="16.5" font-weight="700" fill="#6d28d9">Demucs · 音乐路线</text>
  <g>
    <text x="56" y="176" class="k">模型</text>
    <text x="56" y="194" class="v">htdemucs / htdemucs_ft（balanced / high）</text>
    <text x="56" y="226" class="k">处理域</text>
    <text x="56" y="244" class="v">波形域 · Hybrid Transformer Demucs</text>
    <text x="56" y="276" class="k">调用方式</text>
    <text x="56" y="294" class="v">独立子进程 python -m demucs --two-stems</text>
    <text x="56" y="326" class="k">产物分轨</text>
    <text x="56" y="344" class="v">vocals + no_vocals（人声 / 其余全部）</text>
    <text x="56" y="376" class="k">擅长</text>
    <text x="56" y="394" class="v" fill="#6d28d9" font-weight="600">歌曲、强配乐，鼓 / 贝斯密集的素材</text>
  </g>

  <!-- CDX23 card -->
  <rect class="card" x="498" y="92" width="430" height="300" rx="14"/>
  <rect x="498" y="92" width="430" height="52" rx="14" fill="#f0fdfa"/>
  <rect x="498" y="120" width="430" height="24" fill="#f0fdfa"/>
  <circle cx="524" cy="118" r="7" fill="#14b8a6"/>
  <text x="542" y="123" font-size="16.5" font-weight="700" fill="#0f766e">CDX23 · 影视对白路线</text>
  <g>
    <text x="522" y="176" class="k">模型</text>
    <text x="522" y="194" class="v">MVSEP-CDX23 影视 3-stem（1 / 3-模型集成）</text>
    <text x="522" y="226" class="k">处理域</text>
    <text x="522" y="244" class="v">进程内 PyTorch（复用 demucs.apply 推理）</text>
    <text x="522" y="276" class="k">关键参数</text>
    <text x="522" y="294" class="v">overlap=0.5、shifts=1（重叠相加 + 平移 TTA）</text>
    <text x="522" y="326" class="k">产物分轨</text>
    <text x="522" y="344" class="v">dialog + music + effect → bg = music+effect</text>
    <text x="522" y="376" class="k">擅长</text>
    <text x="522" y="394" class="v" fill="#0f766e" font-weight="600">影视对白，人声与音效 / 环境声纠缠</text>
  </g>

  <!-- unifying bar -->
  <rect x="32" y="412" width="896" height="44" rx="12" fill="#0f172a"/>
  <text x="52" y="439" font-size="13.5" fill="#e2e8f0">无论走哪条路，最终都归一为</text>
  <text x="232" y="439" font-size="13.5" font-weight="700" fill="#93c5fd">voice.*</text>
  <text x="286" y="439" font-size="13.5" fill="#e2e8f0">+</text>
  <text x="304" y="439" font-size="13.5" font-weight="700" fill="#fcd34d">background.*</text>
  <text x="406" y="439" font-size="13.5" fill="#e2e8f0">+</text>
  <text x="424" y="439" font-size="13.5" font-weight="700" fill="#cbd5e1">manifest.json</text>
  <text x="540" y="439" font-size="13.5" fill="#94a3b8">—— 下游环节只认这份契约，不关心上游用了哪个模型。</text>
</svg>
