<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <radialGradient id="lglow" cx="38%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="lsh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .t1{font-size:15px;font-weight:700;}
      .t2{font-size:12px;fill:#64748b;}
      .chip1{font-size:14.5px;font-weight:700;fill:#047857;}
      .chip2{font-size:11.5px;fill:#059669;}
      .mono{font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="600" fill="#fbfcfe"/>
  <rect x="0" y="0" width="960" height="600" fill="url(#lglow)"/>

  <!-- kicker -->
  <circle cx="68" cy="64" r="5" fill="#14b8a6"/>
  <text x="84" y="69" font-size="14.5" font-weight="700" fill="#475569" letter-spacing="0.5">幕后 · 博客 · 决策</text>

  <!-- your-machine boundary -->
  <rect x="64" y="150" width="606" height="356" rx="20" fill="#f6fefb" stroke="#14b8a6" stroke-width="2.2" filter="url(#lsh)"/>
  <!-- laptop glyph -->
  <rect x="92" y="172" width="34" height="22" rx="3" fill="none" stroke="#0f766e" stroke-width="2"/>
  <rect x="86" y="196" width="46" height="4" rx="2" fill="#0f766e"/>
  <text x="140" y="191" font-size="16" font-weight="700" fill="#0f766e">本机 · 默认全在这里</text>
  <text x="92" y="218" class="t2" fill="#0f766e">全程不上网 · 离线可跑 · 不按分钟计费</text>

  <!-- pipeline chips inside (2 x 3) -->
  <g>
    <rect x="96" y="250" width="168" height="86" rx="13" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.6"/>
    <text x="180" y="290" text-anchor="middle" class="chip1">stage1 · 分离</text>
    <text x="180" y="312" text-anchor="middle" class="chip2">cdx23 · 本地</text>

    <rect x="288" y="250" width="168" height="86" rx="13" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.6"/>
    <text x="372" y="290" text-anchor="middle" class="chip1">task-a · 转写</text>
    <text x="372" y="312" text-anchor="middle" class="chip2">funasr · 本地</text>

    <rect x="480" y="250" width="168" height="86" rx="13" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.6"/>
    <text x="564" y="290" text-anchor="middle" class="chip1">task-b · 认人</text>
    <text x="564" y="312" text-anchor="middle" class="chip2">ECAPA · 本地</text>

    <rect x="96" y="356" width="168" height="86" rx="13" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.6"/>
    <text x="180" y="396" text-anchor="middle" class="chip1">task-c · 翻译</text>
    <text x="180" y="418" text-anchor="middle" class="chip2">m2m100 · 本地（默认）</text>

    <rect x="288" y="356" width="168" height="86" rx="13" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.6"/>
    <text x="372" y="396" text-anchor="middle" class="chip1">task-d · 配音</text>
    <text x="372" y="418" text-anchor="middle" class="chip2">moss-onnx · 本地</text>

    <rect x="480" y="356" width="168" height="86" rx="13" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.6"/>
    <text x="564" y="396" text-anchor="middle" class="chip1">task-e · 混音</text>
    <text x="564" y="418" text-anchor="middle" class="chip2">ffmpeg · 本地</text>
  </g>

  <!-- opt-in dashed line out to cloud -->
  <path d="M670,392 L716,392" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="6 5" fill="none"/>
  <rect x="678" y="360" width="34" height="18" rx="9" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="695" y="373" text-anchor="middle" font-size="10" font-weight="700" fill="#4338ca">opt-in</text>

  <!-- cloud (optional) -->
  <rect x="716" y="330" width="180" height="124" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8" stroke-dasharray="7 5"/>
  <path d="M754,378 a16,16 0 0,1 31,-5 a13,13 0 0,1 22,9 a12,12 0 0,1 -3,24 h-44 a14,14 0 0,1 -6,-28 z" fill="#fff" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="806" y="424" text-anchor="middle" font-size="14.5" font-weight="700" fill="#475569">云 · DeepSeek</text>
  <text x="806" y="443" text-anchor="middle" font-size="11.5" fill="#94a3b8">可选 · 默认关闭</text>

  <!-- tagline -->
  <text x="480" y="556" text-anchor="middle" font-size="16" fill="#334155">默认全跑在本机 —— 唯一的例外是<tspan font-weight="700" fill="#0f766e">翻译</tspan>，而且要你<tspan font-weight="700" fill="#4338ca">主动扳开</tspan></text>
</svg>
