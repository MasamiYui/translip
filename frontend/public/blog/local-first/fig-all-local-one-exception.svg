<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 404" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="aa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="ash" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .h{fill:#0f172a;font-weight:700;}
      .s{fill:#64748b;}
      .ln{stroke:#94a3b8;stroke-width:1.6;fill:none;}
      .t1{font-size:12.5px;font-weight:700;fill:#047857;}
      .t2{font-size:10.5px;fill:#059669;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="404" rx="16" fill="#fbfcfe"/>
  <text x="32" y="42" class="h" font-size="21">默认全本地，只有翻译留了一条可选的上云岔路</text>
  <text x="32" y="66" class="s" font-size="13.5">每一站的默认后端都在本机；唯一通往云端的虚线在"翻译"，且默认关闭。</text>

  <!-- cloud (optional) outside the boundary -->
  <rect x="466" y="92" width="190" height="58" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="561" y="116" text-anchor="middle" font-size="12.5" font-weight="700" fill="#475569">云 · DeepSeek</text>
  <text x="561" y="134" text-anchor="middle" font-size="11" fill="#94a3b8">可选 · 默认关闭</text>

  <!-- your-machine boundary -->
  <rect x="32" y="196" width="896" height="150" rx="16" fill="#f6fefb" stroke="#14b8a6" stroke-width="2"/>
  <text x="50" y="222" font-size="12.5" font-weight="700" fill="#0f766e">本机 · 默认全在这里（全程不上网）</text>

  <!-- stages -->
  <g>
    <rect x="48" y="236" width="126" height="84" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5" filter="url(#ash)"/>
    <text x="111" y="276" text-anchor="middle" class="t1">stage1 · 分离</text>
    <text x="111" y="296" text-anchor="middle" class="t2">cdx23 · 本地</text>

    <rect x="194" y="236" width="126" height="84" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5" filter="url(#ash)"/>
    <text x="257" y="276" text-anchor="middle" class="t1">task-a · 转写</text>
    <text x="257" y="296" text-anchor="middle" class="t2">funasr · 本地</text>

    <rect x="340" y="236" width="126" height="84" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5" filter="url(#ash)"/>
    <text x="403" y="276" text-anchor="middle" class="t1">task-b · 认人</text>
    <text x="403" y="296" text-anchor="middle" class="t2">ECAPA · 本地</text>

    <rect x="486" y="236" width="126" height="84" rx="12" fill="#ecfdf5" stroke="#5eead4" stroke-width="2" filter="url(#ash)"/>
    <text x="549" y="276" text-anchor="middle" class="t1">task-c · 翻译</text>
    <text x="549" y="296" text-anchor="middle" class="t2">m2m100 · 本地（默认）</text>

    <rect x="632" y="236" width="126" height="84" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5" filter="url(#ash)"/>
    <text x="695" y="276" text-anchor="middle" class="t1">task-d · 配音</text>
    <text x="695" y="296" text-anchor="middle" class="t2">moss-onnx · 本地</text>

    <rect x="778" y="236" width="126" height="84" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5" filter="url(#ash)"/>
    <text x="841" y="276" text-anchor="middle" class="t1">task-e · 混音</text>
    <text x="841" y="296" text-anchor="middle" class="t2">ffmpeg · 本地</text>
  </g>

  <!-- spine arrows -->
  <path class="ln" d="M174,278 L192,278" marker-end="url(#aa)"/>
  <path class="ln" d="M320,278 L338,278" marker-end="url(#aa)"/>
  <path class="ln" d="M466,278 L484,278" marker-end="url(#aa)"/>
  <path class="ln" d="M612,278 L630,278" marker-end="url(#aa)"/>
  <path class="ln" d="M758,278 L776,278" marker-end="url(#aa)"/>

  <!-- opt-in dashed branch from task-c up to cloud -->
  <path d="M549,236 L549,150" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="6 5" fill="none" marker-end="url(#aa)"/>
  <rect x="566" y="176" width="120" height="20" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="626" y="190" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4338ca">opt-in · 需主动扳开</text>

  <text x="32" y="384" class="s" font-size="12.5">默认这条命令一个字节都不上网；只有当你显式 <tspan font-family="'SF Mono',ui-monospace,Menlo,monospace" font-size="11.5" fill="#475569">--translation-backend deepseek</tspan> 时，才会走那条虚线。</text>
</svg>
