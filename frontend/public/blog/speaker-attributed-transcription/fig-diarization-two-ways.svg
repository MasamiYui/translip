<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 504" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="sb" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .h{fill:#0f172a;font-weight:700;}
      .s{fill:#64748b;}
      .ln{stroke:#94a3b8;stroke-width:1.6;fill:none;}
      .pill{fill:#fff;stroke:#e2e8f0;stroke-width:1.5;filter:url(#sb);}
      .t1{font-size:13px;font-weight:600;fill:#1e293b;}
      .t2{font-size:11px;fill:#64748b;}
      .tk{font-size:11.5px;font-weight:600;fill:#334155;text-anchor:middle;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="504" rx="16" fill="#fbfcfe"/>
  <text x="32" y="42" class="h" font-size="21">说话人分离的两种哲学：都回答“每句话是谁说的”</text>
  <text x="32" y="66" class="s" font-size="13.5">默认把“谁”锚定在 ASR 句子上（聚类）；pyannote 各跑各的时间线，再按时间重叠对齐。</text>

  <!-- LEFT panel: ECAPA -->
  <rect x="28" y="92" width="436" height="384" rx="14" fill="#fdfdff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="28" y="92" width="436" height="40" rx="14" fill="#eef2ff"/>
  <rect x="28" y="120" width="436" height="12" fill="#eef2ff"/>
  <text x="246" y="118" font-size="14" font-weight="700" fill="#3730a3" text-anchor="middle">锚定在 ASR 上 · ECAPA（默认）</text>

  <rect class="pill" x="96" y="150" width="300" height="40" rx="10"/>
  <text x="246" y="175" class="tk">① ASR 句子（已知“何时”）</text>
  <rect class="pill" x="96" y="206" width="300" height="40" rx="10"/>
  <text x="246" y="231" class="tk">② 相邻短句攒成嵌入组</text>
  <rect class="pill" x="96" y="262" width="300" height="40" rx="10"/>
  <text x="246" y="287" class="tk">③ 每组提一个 ECAPA 声纹</text>
  <rect class="pill" x="96" y="318" width="300" height="40" rx="10"/>
  <text x="246" y="343" class="tk">④ 余弦相似度 + 层次聚类</text>
  <rect class="pill" x="96" y="374" width="300" height="40" rx="10" stroke="#a7f3d0"/>
  <text x="246" y="399" class="tk" fill="#047857">⑤ 时序平滑 → SPEAKER_xx</text>

  <path class="ln" d="M246,190 L246,204" marker-end="url(#ab)"/>
  <path class="ln" d="M246,246 L246,260" marker-end="url(#ab)"/>
  <path class="ln" d="M246,302 L246,316" marker-end="url(#ab)"/>
  <path class="ln" d="M246,358 L246,372" marker-end="url(#ab)"/>

  <text x="246" y="446" class="t2" text-anchor="middle">不另起时间线，标签天生贴在句子上</text>
  <text x="246" y="463" class="t2" text-anchor="middle" font-weight="600" fill="#475569">便宜 · 对齐，但分辨率被分句锁死</text>

  <!-- RIGHT panel: pyannote -->
  <rect x="496" y="92" width="436" height="384" rx="14" fill="#fdfefe" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="496" y="92" width="436" height="40" rx="14" fill="#f0fdfa"/>
  <rect x="496" y="120" width="436" height="12" fill="#f0fdfa"/>
  <text x="714" y="118" font-size="14" font-weight="700" fill="#0f766e" text-anchor="middle">独立时间线 + 按重叠对齐 · pyannote</text>

  <!-- boundary guide -->
  <line x1="700" y1="178" x2="700" y2="332" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="4 4"/>

  <!-- ASR track -->
  <text x="516" y="200" class="t2">ASR 句子</text>
  <rect x="560" y="184" width="96" height="26" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="608" y="201" class="tk">句1</text>
  <rect x="660" y="184" width="118" height="26" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="719" y="201" class="tk">句2</text>
  <rect x="782" y="184" width="114" height="26" rx="6" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="839" y="201" class="tk">句3</text>

  <!-- pyannote turns -->
  <text x="516" y="282" class="t2">pyannote 轮次</text>
  <rect x="560" y="266" width="138" height="26" rx="6" fill="#6366f1"/>
  <text x="629" y="283" class="tk" fill="#fff">说话人 A</text>
  <rect x="702" y="266" width="194" height="26" rx="6" fill="#14b8a6"/>
  <text x="799" y="283" class="tk" fill="#fff">说话人 B</text>

  <!-- result -->
  <text x="516" y="362" class="t2">认领结果</text>
  <rect x="560" y="346" width="96" height="26" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="608" y="363" class="tk" fill="#4338ca">A</text>
  <rect x="660" y="346" width="118" height="26" rx="6" fill="#ecfeff" stroke="#99f6e4"/>
  <text x="719" y="363" class="tk" fill="#0f766e">B</text>
  <rect x="782" y="346" width="114" height="26" rx="6" fill="#ecfeff" stroke="#99f6e4"/>
  <text x="839" y="363" class="tk" fill="#0f766e">B</text>

  <path class="ln" d="M608,210 L608,344" stroke-dasharray="3 4" marker-end="url(#ab)"/>
  <path class="ln" d="M719,210 L719,344" stroke-dasharray="3 4" marker-end="url(#ab)"/>
  <path class="ln" d="M839,210 L839,344" stroke-dasharray="3 4" marker-end="url(#ab)"/>

  <text x="714" y="408" class="t2" text-anchor="middle" font-weight="600" fill="#475569">句2 与 B 重叠更多 → 判给 B</text>
  <text x="714" y="446" class="t2" text-anchor="middle">每句认领“时间重叠最多”的轮次（无重叠则取最近）</text>
  <text x="714" y="463" class="t2" text-anchor="middle" font-weight="600" fill="#475569">更准（多人/抢话），但更重 · 要 token · 要联网</text>
</svg>
