<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="ca" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="csh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .h{fill:#0f172a;font-weight:700;}
      .s{fill:#64748b;}
      .ln{stroke:#94a3b8;stroke-width:1.6;fill:none;}
      .box{fill:#fff;stroke:#e2e8f0;stroke-width:1.5;filter:url(#csh);}
      .t1{font-size:13px;font-weight:700;fill:#0f172a;}
      .t2{font-size:11px;fill:#64748b;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="430" rx="16" fill="#fbfcfe"/>
  <text x="32" y="42" class="h" font-size="21">编排器只做三件事——而且都不是算法</text>
  <text x="32" y="66" class="s" font-size="13.5">解析 DAG、查缓存、把命令丢进子进程；分离 / 转写 / 翻译 / 配音，全在子进程那一侧。</text>

  <!-- zone labels -->
  <text x="245" y="100" class="s" font-size="12.5" text-anchor="middle" font-weight="700" fill="#475569">调度（编排器）</text>
  <text x="758" y="100" class="s" font-size="12.5" text-anchor="middle" font-weight="700" fill="#475569">算法（子进程）</text>
  <line x1="572" y1="112" x2="572" y2="372" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="5 5"/>

  <!-- orchestrator -->
  <rect class="box" x="40" y="120" width="206" height="216" rx="12"/>
  <rect x="40" y="120" width="6" height="216" rx="3" fill="#4f46e5"/>
  <text x="146" y="206" class="t1" text-anchor="middle" font-size="14.5" fill="#4338ca">流水线编排器</text>
  <text x="146" y="230" class="t2" text-anchor="middle">orchestration / runner.py</text>
  <text x="146" y="256" class="t2" text-anchor="middle" font-style="italic">不加载任何模型</text>

  <!-- three jobs -->
  <rect class="box" x="270" y="120" width="276" height="62" rx="12"/>
  <rect x="270" y="120" width="6" height="62" rx="3" fill="#6366f1"/>
  <text x="290" y="148" class="t1" fill="#4338ca">① 解析 DAG</text>
  <text x="290" y="168" class="t2">要跑哪些节点、按什么顺序</text>

  <rect class="box" x="270" y="197" width="276" height="62" rx="12"/>
  <rect x="270" y="197" width="6" height="62" rx="3" fill="#6366f1"/>
  <text x="290" y="225" class="t1" fill="#4338ca">② 查缓存</text>
  <text x="290" y="245" class="t2">这一站上次跑过、还能复用吗</text>

  <rect class="box" x="270" y="274" width="276" height="62" rx="12"/>
  <rect x="270" y="274" width="6" height="62" rx="3" fill="#6366f1"/>
  <text x="290" y="302" class="t1" fill="#4338ca">③ shell out</text>
  <text x="290" y="322" class="t2">把对应命令丢进隔离子进程</text>

  <path class="ln" d="M246,151 L262,151" marker-end="url(#ca)"/>
  <path class="ln" d="M246,228 L262,228" marker-end="url(#ca)"/>
  <path class="ln" d="M246,305 L262,305" marker-end="url(#ca)"/>

  <!-- algorithm sandbox -->
  <rect x="596" y="120" width="324" height="216" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="758" y="146" class="t1" text-anchor="middle" fill="#475569">子进程 · 任务逻辑都在这边</text>

  <rect class="box" x="618" y="166" width="130" height="44" rx="10"/>
  <text x="683" y="193" class="t2" text-anchor="middle" font-weight="700" fill="#334155">stage1 · 分离</text>
  <rect class="box" x="766" y="166" width="130" height="44" rx="10"/>
  <text x="831" y="193" class="t2" text-anchor="middle" font-weight="700" fill="#334155">task-a · 转写</text>
  <rect class="box" x="618" y="224" width="130" height="44" rx="10"/>
  <text x="683" y="251" class="t2" text-anchor="middle" font-weight="700" fill="#334155">task-c · 翻译</text>
  <rect class="box" x="766" y="224" width="130" height="44" rx="10"/>
  <text x="831" y="251" class="t2" text-anchor="middle" font-weight="700" fill="#334155">task-d · 配音</text>

  <text x="758" y="306" class="t2" text-anchor="middle" fill="#94a3b8">demucs · Whisper · ECAPA · TTS …模型只在这一侧加载</text>

  <path class="ln" d="M546,305 L572,305 L572,233 L592,233" marker-end="url(#ca)"/>

  <text x="32" y="408" class="s" font-size="12.5">加一个新算法 / 新后端，改的是子进程那一侧；编排器这边——解析、查缓存、起子进程——纹丝不动。</text>
</svg>
