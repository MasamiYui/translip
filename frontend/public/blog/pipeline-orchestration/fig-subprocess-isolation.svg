<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 446" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="ia" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="ish" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .h{fill:#0f172a;font-weight:700;}
      .s{fill:#64748b;}
      .ln{stroke:#94a3b8;stroke-width:1.6;fill:none;}
      .box{fill:#fff;stroke:#e2e8f0;stroke-width:1.5;filter:url(#ish);}
      .t1{font-size:13px;font-weight:700;fill:#0f172a;}
      .t2{font-size:11px;fill:#64748b;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="446" rx="16" fill="#fbfcfe"/>
  <text x="32" y="42" class="h" font-size="21">为什么是子进程，而不是函数调用</text>
  <text x="32" y="66" class="s" font-size="13.5">重模型随进程退出而释放、崩溃被沙盒挡住、取消能把整组干净地杀掉。</text>

  <!-- parent process -->
  <rect class="box" x="40" y="100" width="880" height="52" rx="12"/>
  <rect x="40" y="100" width="6" height="52" rx="3" fill="#4f46e5"/>
  <text x="480" y="131" class="t1" text-anchor="middle" font-size="13.5" fill="#4338ca">编排器（父进程）· 长命 · 不加载任何模型 · 自己跑不崩</text>

  <!-- spawn arrows -->
  <path class="ln" d="M172,152 L172,194" marker-end="url(#ia)"/>
  <text x="186" y="178" class="t2">起子进程</text>
  <path class="ln" d="M480,152 L480,194" marker-end="url(#ia)"/>
  <text x="494" y="178" class="t2">起子进程</text>
  <path class="ln" d="M788,152 L788,194" marker-end="url(#ia)"/>
  <text x="802" y="178" class="t2">起子进程</text>

  <!-- child 1: task-a -->
  <rect x="64" y="196" width="216" height="196" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="172" y="224" class="t1" text-anchor="middle">task-a · 子进程</text>
  <rect x="88" y="246" width="26" height="104" rx="6" fill="#eef2ff"/>
  <rect x="88" y="278" width="26" height="72" rx="6" fill="#6366f1"/>
  <text x="128" y="266" class="t2">运行时占用</text>
  <text x="128" y="285" class="t2" fill="#475569" font-weight="600">Whisper · ECAPA</text>
  <text x="172" y="376" class="t2" text-anchor="middle" fill="#0f766e">退出 → 整块内存归还</text>

  <!-- child 2: task-d -->
  <rect x="372" y="196" width="216" height="196" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="480" y="224" class="t1" text-anchor="middle">task-d · 子进程</text>
  <rect x="396" y="246" width="26" height="104" rx="6" fill="#eef2ff"/>
  <rect x="396" y="252" width="26" height="98" rx="6" fill="#6366f1"/>
  <text x="436" y="266" class="t2">运行时占用</text>
  <text x="436" y="285" class="t2" fill="#475569" font-weight="600">TTS（最重的一站）</text>
  <text x="480" y="376" class="t2" text-anchor="middle" fill="#0f766e">退出 → 整块内存归还</text>

  <!-- child 3: crash -->
  <rect x="680" y="196" width="216" height="196" rx="14" fill="#fffbeb" stroke="#fde68a" stroke-width="1.6" stroke-dasharray="6 5"/>
  <text x="788" y="224" class="t1" text-anchor="middle" fill="#b45309">task-x · 子进程</text>
  <circle cx="788" cy="288" r="30" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="788" y="299" text-anchor="middle" font-size="30" font-weight="700" fill="#f59e0b">!</text>
  <text x="788" y="344" class="t2" text-anchor="middle" font-weight="700" fill="#b45309">OOM / 段错误</text>
  <text x="788" y="362" class="t2" text-anchor="middle" fill="#d97706">崩在沙盒里，毒不到父进程</text>
  <text x="788" y="380" class="t2" text-anchor="middle" fill="#d97706">required=false → 记 partial_success</text>

  <text x="32" y="424" class="s" font-size="12.5">取消时：<tspan font-family="'SF Mono',ui-monospace,Menlo,monospace" font-size="11.5" fill="#475569">os.killpg(pid, SIGTERM)</tspan>，5 秒不退再 <tspan font-family="'SF Mono',ui-monospace,Menlo,monospace" font-size="11.5" fill="#475569">SIGKILL</tspan>——连同模型起的子孙进程一起带走。父进程始终安然无恙。</text>
</svg>
