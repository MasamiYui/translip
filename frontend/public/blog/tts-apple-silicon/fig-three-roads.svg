<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <filter id="rdsh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .h{fill:#0f172a;font-weight:700;}
      .s{fill:#64748b;}
      .road{font-size:12px;font-weight:700;}
      .nm{font-size:16px;font-weight:800;}
      .li{font-size:11.5px;fill:#475569;}
      .note{font-size:10.5px;fill:#94a3b8;}
      .mono{font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="360" rx="16" fill="#fbfcfe"/>
  <text x="32" y="42" class="h" font-size="21">Mac 上的配音后端,现实就三条路</text>
  <text x="32" y="66" class="s" font-size="13.5">留一个跑得动的默认、走一条唯一的升级窄门、把够不着的皇冠显式地交给云。</text>

  <!-- Road 1: keep MOSS -->
  <rect x="32" y="96" width="288" height="240" rx="14" fill="#fff" stroke="#bbf7d0" stroke-width="2" filter="url(#rdsh)"/>
  <rect x="32" y="96" width="6" height="240" rx="3" fill="#16a34a"/>
  <text x="54" y="126" class="road" fill="#15803d">① 本地默认</text>
  <rect x="240" y="110" width="64" height="24" rx="12" fill="#16a34a"/>
  <text x="272" y="127" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">✓ 保留</text>
  <text x="54" y="162" class="nm" fill="#15803d">MOSS-Nano</text>
  <line x1="54" y1="176" x2="298" y2="176" stroke="#eef2f7"/>
  <text x="54" y="202" class="li"><tspan font-weight="700" fill="#15803d">实时 1.93×</tspan> · 原生 48 kHz</text>
  <text x="54" y="226" class="li">100M · 可多 worker 并行</text>
  <text x="54" y="250" class="li">绝大多数场景,现在就能跑</text>
  <rect x="54" y="268" width="244" height="48" rx="9" fill="#f0fdf4"/>
  <text x="66" y="290" class="note" fill="#15803d">默认锚在"能在本机跑通",</text>
  <text x="66" y="306" class="note" fill="#15803d">不锚在排行榜。</text>

  <!-- Road 2: upgrade F5-mlx -->
  <rect x="336" y="96" width="288" height="240" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="2" filter="url(#rdsh)"/>
  <rect x="336" y="96" width="6" height="240" rx="3" fill="#4f46e5"/>
  <text x="358" y="126" class="road" fill="#4338ca">② 唯一升级</text>
  <rect x="520" y="110" width="88" height="24" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="564" y="127" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">候选 · 待实测</text>
  <text x="358" y="162" class="nm" fill="#3730a3">F5-TTS · MLX</text>
  <line x1="358" y1="176" x2="602" y2="176" stroke="#eef2f7"/>
  <text x="358" y="202" class="li"><tspan font-weight="700" fill="#4338ca">MIT 可商用</tspan> · ~1.6× 实时</text>
  <text x="358" y="226" class="li mono" font-size="10.5" fill="#475569">ref_audio+ref_text→synthesize</text>
  <text x="358" y="248" class="li">一个文件 + 一行注册即可接入</text>
  <rect x="358" y="268" width="244" height="48" rx="9" fill="#eef2ff"/>
  <text x="370" y="290" class="note" fill="#4338ca">有路径 ≠ 已验证——先在你的</text>
  <text x="370" y="306" class="note" fill="#4338ca">M4 上跑整句,测持续 RTF。</text>

  <!-- Road 3: cross-lingual crown -> GPU/API -->
  <rect x="640" y="96" width="288" height="240" rx="14" fill="#fff" stroke="#fde68a" stroke-width="2" filter="url(#rdsh)"/>
  <rect x="640" y="96" width="6" height="240" rx="3" fill="#f59e0b"/>
  <text x="662" y="126" class="road" fill="#b45309">③ 跨语种皇冠</text>
  <rect x="828" y="110" width="84" height="24" rx="12" fill="#fffbeb" stroke="#fde68a"/>
  <text x="870" y="127" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">本地够不着</text>
  <text x="662" y="160" class="nm" font-size="14" fill="#b45309">IndexTTS 2.5</text>
  <text x="662" y="180" class="nm" font-size="14" fill="#b45309">CosyVoice 3</text>
  <line x1="662" y1="192" x2="906" y2="192" stroke="#eef2f7"/>
  <text x="662" y="216" class="li">跨语种音色最像……</text>
  <text x="662" y="238" class="li" fill="#b91c1c">但无 Apple Silicon 路径</text>
  <rect x="662" y="256" width="244" height="60" rx="9" fill="#fffbeb"/>
  <text x="674" y="278" class="note" fill="#b45309">→ 远程 GPU,或 opt-in API</text>
  <text x="674" y="296" class="note" fill="#b45309">(像 deepseek 那样显式开)</text>
  <text x="674" y="312" class="note" fill="#94a3b8">云是主动按下的开关</text>
</svg>
