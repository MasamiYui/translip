<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 304" font-family="'Inter','PingFang SC','Microsoft YaHei',ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arp" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .h{fill:#0f172a;font-weight:700;}
      .s{fill:#64748b;}
      .ln{stroke:#94a3b8;stroke-width:1.6;fill:none;}
      .loop{stroke:#a78bfa;stroke-width:1.5;fill:none;stroke-dasharray:5 4;}
      .box{fill:#fff;stroke:#e2e8f0;stroke-width:1.5;filter:url(#sh);}
      .nm{font-size:13.5px;font-weight:700;fill:#0f172a;}
      .rl{font-size:10.5px;fill:#64748b;}
      .bn{font-size:11px;font-weight:700;fill:#fff;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="304" rx="16" fill="#fbfcfe"/>
  <text x="32" y="44" class="h" font-size="21">AI 助手：一句话，自动编排原子能力</text>
  <text x="32" y="69" class="s" font-size="13.5">先规划、再确认、后执行——计划全程可见，参数可改，绝不黑箱直接跑。</text>

  <!-- clarify loop (drawn first, under nodes) -->
  <path class="loop" d="M251,108 C251,86 101,86 101,108" marker-end="url(#arp)"/>
  <text x="176" y="80" font-size="11" font-weight="700" fill="#7c3aed" text-anchor="middle">信息不足 → 反问澄清</text>

  <!-- 6 steps -->
  <rect class="box" x="32" y="108" width="138" height="120" rx="13"/>
  <rect x="32" y="108" width="6" height="120" rx="3" fill="#7c3aed"/>
  <circle cx="101" cy="136" r="13" fill="#7c3aed"/><text x="101" y="140" class="bn" text-anchor="middle">1</text>
  <text x="101" y="172" class="nm" text-anchor="middle">描述目标</text>
  <text x="101" y="194" class="rl" text-anchor="middle">一句话说清要做什么</text>
  <text x="101" y="210" class="rl" text-anchor="middle">可随手附上文件</text>

  <rect class="box" x="182" y="108" width="138" height="120" rx="13"/>
  <rect x="182" y="108" width="6" height="120" rx="3" fill="#7c3aed"/>
  <circle cx="251" cy="136" r="13" fill="#7c3aed"/><text x="251" y="140" class="bn" text-anchor="middle">2</text>
  <text x="251" y="172" class="nm" text-anchor="middle">智能规划</text>
  <text x="251" y="194" class="rl" text-anchor="middle">DeepSeek 拆解为</text>
  <text x="251" y="210" class="rl" text-anchor="middle">原子工具调用链</text>

  <rect class="box" x="332" y="108" width="138" height="120" rx="13"/>
  <rect x="332" y="108" width="6" height="120" rx="3" fill="#7c3aed"/>
  <circle cx="401" cy="136" r="13" fill="#7c3aed"/><text x="401" y="140" class="bn" text-anchor="middle">3</text>
  <text x="401" y="172" class="nm" text-anchor="middle">展示调用链</text>
  <text x="401" y="194" class="rl" text-anchor="middle">预览每一步</text>
  <text x="401" y="210" class="rl" text-anchor="middle">参数可编辑</text>

  <rect class="box" x="482" y="108" width="138" height="120" rx="13"/>
  <rect x="482" y="108" width="6" height="120" rx="3" fill="#7c3aed"/>
  <circle cx="551" cy="136" r="13" fill="#7c3aed"/><text x="551" y="140" class="bn" text-anchor="middle">4</text>
  <text x="551" y="172" class="nm" text-anchor="middle">确认执行</text>
  <text x="551" y="194" class="rl" text-anchor="middle">看清计划后</text>
  <text x="551" y="210" class="rl" text-anchor="middle">一键开跑</text>

  <rect class="box" x="632" y="108" width="138" height="120" rx="13"/>
  <rect x="632" y="108" width="6" height="120" rx="3" fill="#7c3aed"/>
  <circle cx="701" cy="136" r="13" fill="#7c3aed"/><text x="701" y="140" class="bn" text-anchor="middle">5</text>
  <text x="701" y="172" class="nm" text-anchor="middle">逐步运行</text>
  <text x="701" y="194" class="rl" text-anchor="middle">实时显示每步</text>
  <text x="701" y="210" class="rl" text-anchor="middle">状态与进度</text>

  <rect class="box" x="782" y="108" width="138" height="120" rx="13"/>
  <rect x="782" y="108" width="6" height="120" rx="3" fill="#059669"/>
  <circle cx="851" cy="136" r="13" fill="#059669"/><text x="851" y="140" class="bn" text-anchor="middle">6</text>
  <text x="851" y="172" class="nm" text-anchor="middle">下载产物</text>
  <text x="851" y="194" class="rl" text-anchor="middle">汇总所有</text>
  <text x="851" y="210" class="rl" text-anchor="middle">最终文件</text>

  <!-- arrows -->
  <path class="ln" d="M170,168 L182,168" marker-end="url(#ar)"/>
  <path class="ln" d="M320,168 L332,168" marker-end="url(#ar)"/>
  <path class="ln" d="M470,168 L482,168" marker-end="url(#ar)"/>
  <path class="ln" d="M620,168 L632,168" marker-end="url(#ar)"/>
  <path class="ln" d="M770,168 L782,168" marker-end="url(#ar)"/>

  <text x="32" y="278" class="s" font-size="12.5">需要 DeepSeek API Key（在「全局设置 → API 密钥」配置）。助手只编排已有原子工具，不会凭空生成新能力。</text>
</svg>
