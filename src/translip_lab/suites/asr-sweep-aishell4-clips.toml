# Config sweep: same AISHELL-4 clips, compare faster-whisper tiny vs small (both
# cached). Produces a sweep matrix + winner. The optimization loop: try N configs,
# see which wins on CER (macro mean + corpus micro).
name = "asr-sweep-aishell4-clips"
dataset = "clip"
scenarios = ["asr"]
timeout_sec = 3600

[dataset_params]
base = "aishell4"
seconds = 120
max_samples = 2

[dataset_params.base_params]
subset = "test"

[scenario_config.asr]
asr_backend = "faster-whisper"
language = "zh"

[[arms]]
label = "tiny"
[arms.scenario_config.asr]
asr_model = "tiny"

[[arms]]
label = "small"
[arms.scenario_config.asr]
asr_model = "small"
